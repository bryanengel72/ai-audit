<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;600&family=Raleway:wght@300;400&display=swap"
    rel="stylesheet">
  <title>2026 AI Readiness Audit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#007BFF',   // Primary Blue
              dark: '#16324f',      // Secondary Dark Blue
              calm: '#4a91c4',      // Calm Blue
              sky: '#d1e8ff',       // Sky Soft Blue
              green: '#28a745',     // Vibrant Green
              yellow: '#ffc501',    // Vivid Yellow
              gray: '#6c757d',      // Pompeii Ash
            }
          },
          fontFamily: {
            sans: ['Open Sans', 'sans-serif'],      // Body Text
            heading: ['Montserrat', 'sans-serif'],  // Headings
            accent: ['Raleway', 'sans-serif'],      // Accents
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      background-color: #16324f;
      /* Brand Dark */
      color: #f9fafb;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Montserrat', sans-serif;
    }

    .font-accent {
      font-family: 'Raleway', sans-serif;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }
    }
  </style>

{

    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "jspdf": "https://esm.sh/jspdf@^2.5.1",
    "framer-motion": "https://esm.sh/framer-motion@12.0.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
